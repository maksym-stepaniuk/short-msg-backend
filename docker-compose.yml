x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-limits: &app-limits
  cpus: "0.50"
  mem_limit: 256m

x-db-limits: &db-limits
  cpus: "0.75"
  mem_limit: 512m

services:
  nginx:
    image: nginx:1.27-alpine
    cpus: "0.25"
    mem_limit: 128m
    logging: *default-logging
    stop_grace_period: 10s
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - public
      - private
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    <<: *db-limits
    logging: *default-logging
    stop_grace_period: 30s
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo:
    image: mongo:7
    <<: *db-limits
    logging: *default-logging
    stop_grace_period: 30s
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:?Set MONGO_INITDB_DATABASE in .env}
    secrets:
      - mongo_root_password
    volumes:
      - mongo_data:/data/db
    networks:
      - private
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$$(cat /run/secrets/mongo_root_password)\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  pg-service:
    build:
      context: ./services/pg-service
    <<: *app-limits
    logging: *default-logging
    stop_grace_period: 20s
    environment:
      NODE_ENV: production
      PG_SERVICE_PORT: ${PG_SERVICE_PORT:-3001}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    secrets:
      - postgres_password
    command:
      [
        "sh",
        "-c",
        "export DATABASE_URL=\"postgresql://$${POSTGRES_USER}:$$(cat /run/secrets/postgres_password)@$${POSTGRES_HOST}:$${POSTGRES_PORT}/$${POSTGRES_DB}\" && npx prisma migrate deploy && npm run knex:migrate && npm run knex:seed && exec node dist/index.js"
      ]
    expose:
      - "3001"
    networks:
      - private
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  mongo-service:
    build:
      context: ./services/mongo-service
    <<: *app-limits
    logging: *default-logging
    stop_grace_period: 20s
    environment:
      NODE_ENV: production
      MONGO_SERVICE_PORT: ${MONGO_SERVICE_PORT:-3002}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME in .env}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:?Set MONGO_INITDB_DATABASE in .env}
      MONGO_HOST: ${MONGO_HOST:-mongo}
      MONGO_PORT: ${MONGO_PORT:-27017}
    secrets:
      - mongo_root_password
    command:
      [
        "sh",
        "-c",
        "export MONGO_URI=\"mongodb://$${MONGO_INITDB_ROOT_USERNAME}:$$(cat /run/secrets/mongo_root_password)@$${MONGO_HOST}:$${MONGO_PORT}/$${MONGO_INITDB_DATABASE}?authSource=admin\" && export MONGO_DATABASE=\"$${MONGO_INITDB_DATABASE}\" && exec node dist/index.js"
      ]
    expose:
      - "3002"
    networks:
      - private
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker-service:
    build:
      context: ./services/worker-service
    cpus: "0.25"
    mem_limit: 128m
    logging: *default-logging
    stop_grace_period: 10s
    environment:
      NODE_ENV: production
      WORKER_SERVICE_PORT: ${WORKER_SERVICE_PORT:-3003}
    expose:
      - "3003"
    networks:
      - private
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-gateway:
    build:
      context: ./services/api-gateway
    <<: *app-limits
    logging: *default-logging
    stop_grace_period: 15s
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: ${API_GATEWAY_PORT:-3000}
      PG_SERVICE_URL: ${PG_SERVICE_URL:-http://pg-service:3001}
      MONGO_SERVICE_URL: ${MONGO_SERVICE_URL:-http://mongo-service:3002}
      WORKER_SERVICE_URL: ${WORKER_SERVICE_URL:-http://worker-service:3003}
    expose:
      - "3000"
    networks:
      - private
    depends_on:
      pg-service:
        condition: service_healthy
      mongo-service:
        condition: service_healthy
      worker-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:4.8.1
    profiles:
      - tools
    cpus: "0.25"
    mem_limit: 128m
    logging: *default-logging
    stop_grace_period: 10s
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    networks:
      - public
      - private
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:

secrets:
  postgres_password:
    environment: POSTGRES_PASSWORD
  mongo_root_password:
    environment: MONGO_INITDB_ROOT_PASSWORD

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    internal: true
